<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEOSFERA — Fuentes</title>
  <link rel="stylesheet" href="./css/Estilos.css">
</head>
<body>

  <header>
    <h1>PARESIA</h1>
    <nav>
      <a href="Menu.html">Menu</a>
      <a href="Glosario.html">Glosario</a>
      <a href="Fuentes.html">Fuentes</a>
    </nav>
  </header>

  <main>
    <h2>Fuentes monitorizadas</h2>
    <div id="lista-fuentes">Cargando fuentes...</div>
  </main>

  <script type="module">
    import { bd } from './js/bd.js'

    const { data, error } = await bd.from('Fuentes').select('*').order('nombre')

    const contenedor = document.getElementById('lista-fuentes')

    if (error) {
      contenedor.innerHTML = '<p>Error al cargar las fuentes.</p>'
    } else {
      contenedor.innerHTML = data.map(f => `
        <div class="tarjeta-fuente">
          <div class="fuente-header">
            <h3>${f.nombre}</h3>
            <span class="badge ${f.activa ? 'activa' : 'inactiva'}">
              ${f.activa ? 'Activa' : 'Inactiva'}
            </span>
          </div>
          <div class="fuente-meta">
            <span>🌍 ${f.region ?? '—'}</span>
            <span>🗣️ ${f.idioma ?? '—'}</span>
            <span>📰 ${f.noticias_hoy ?? 0} noticias hoy</span>
          </div>
          <a href="${f.url_rss}" target="_blank">Ver feed RSS →</a>
        </div>
      `).join('')
    }
  </script>

</body>
</html>
