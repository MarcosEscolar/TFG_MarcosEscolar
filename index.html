<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEOSFERA</title>
  <link rel="stylesheet" href="./css/Estilos.css">
</head>
<body>

  <header>
    <h1>GEOSFERA</h1>
    <nav>
      <a href="index.html">Menu</a>
      <a href="Glosario.html">Glosario</a>
      <a href="Fuentes.html">Fuentes</a>
    </nav>
  </header>

  <main>
    <div id="feed">Cargando noticias...</div>
  </main>

  <script type="module">
    import { bd } from './js/bd.js'

    const { data, error } = await bd.from('Noticias').select('*')

    const contenedor = document.getElementById('feed')

    if (error) {
      contenedor.innerHTML = '<p>Error al cargar las noticias.</p>'
    } else {
      contenedor.innerHTML = data.map(n => `
        <div class="tarjeta">
          <div class="tema">${n.tema ?? 'Sin tema'}</div>
          <h2>${n.titulo}</h2>
          <p>${n.resumen_es}</p>
          <div class="meta">
            <span class="fuente">${n.fuente}</span>
            <span class="idioma">${n.idioma}</span>
            <a href="${n.url}" target="_blank">Leer original →</a>
          </div>
          <div class="terminos">${n.terminos ?? ''}</div>
        </div>
      `).join('')
    }
  </script>

</body>
</html>
