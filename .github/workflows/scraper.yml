name: Scraper GEOSFERA

on:
  schedule:
    # Se ejecuta una vez al día a las 06:00 UTC (08:00 hora peninsular)
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Permite lanzarlo manualmente desde GitHub → Actions → Run workflow

# Permisos mínimos: solo leer el repo, no escribir
permissions:
  contents: read

# Evita que dos ejecuciones se solapen (si una tarda, la siguiente espera o se cancela)
concurrency:
  group: scraper-geosfera
  cancel-in-progress: false

jobs:
  scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Verificar que los secretos están configurados
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
        run: |
          missing=()
          [ -z "$SUPABASE_URL" ]         && missing+=("SUPABASE_URL")
          [ -z "$SUPABASE_SERVICE_KEY" ] && missing+=("SUPABASE_SERVICE_KEY")
          [ -z "$GEMINI_API_KEY" ]       && missing+=("GEMINI_API_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Faltan secretos en el repositorio: ${missing[*]}"
            echo "Configúralos en: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "Secretos OK"

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Instalar dependencias
        run: pip install -r scraper/requirements.txt

      - name: Ejecutar scraper
        working-directory: scraper
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
